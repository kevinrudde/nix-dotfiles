$font = JetBrains Mono

general {
  hide_cursor = true
}

animations {
  enabled = true
  bezier = ease, 0.2, 0.9, 0.1, 1.0
  animation = fadeIn, 1, 4, ease
  animation = fadeOut, 1, 4, ease
  animation = inputFieldDots, 1, 2, ease
}

background {
  monitor =
  path = screenshot
  blur_passes = 4
  blur_size = 8
  noise = 0.015
  contrast = 1.05
  brightness = 0.75
  vibrancy = 0.15
  vibrancy_darkness = 0.25
}

input-field {
  monitor =
  size = 360, 56
  outline_thickness = 2
  dots_size = 0.28
  dots_spacing = 0.22
  fade_on_empty = false
  rounding = 8
  inner_color = rgba(15121bdd)
  outer_color = rgba(96d8ffff)
  check_color = rgba(a8ff96ff)
  fail_color = rgba(ff5874ff)
  font_color = rgba(d9e4ffff)
  font_family = $font
  placeholder_text = Password
  fail_text = $PAMFAIL
  position = 0, -36
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  color = rgba(96d8ffff)
  font_size = 78
  font_family = $font
  position = 0, 92
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B %Y"
  color = rgba(d9e4ffff)
  font_size = 18
  font_family = $font
  position = 0, 38
  halign = center
  valign = center
}

label {
  monitor =
  text = Locked
  color = rgba(6f7285ff)
  font_size = 14
  font_family = $font
  position = 0, -112
  halign = center
  valign = center
}
