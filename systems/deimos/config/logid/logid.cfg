devices: (
  {
    name: "MX Master 3S";

    smartshift:
    {
      on: true;
      threshold: 45;
    };

    hiresscroll:
    {
      hires: true;
      invert: false;
      target: false;
    };

    buttons: (
      {
        cid: 0xc3;
        action =
        {
          type: "Gestures";
          gestures: (
            {
              direction: "Left";
              mode: "OnRelease";
              action =
              {
                type: "Keypress";
                keys: ["KEY_LEFTALT", "KEY_LEFTMETA", "KEY_LEFT"];
              };
            },
            {
              direction: "Right";
              mode: "OnRelease";
              action =
              {
                type: "Keypress";
                keys: ["KEY_LEFTALT", "KEY_LEFTMETA", "KEY_RIGHT"];
              };
            },
            {
              direction: "None";
              mode: "OnRelease";
              action =
              {
                type: "None";
              };
            }
          );
        };
      },
      {
        cid: 0xc4;
        action =
        {
          type: "Gestures";
          gestures: (
            {
              direction: "None";
              mode: "OnRelease";
              action =
              {
                type: "ToggleSmartShift";
              };
            }
          );
        };
      }
    );
  }
);

timeout = 20000;
